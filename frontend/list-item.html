<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta property="og:type"        content="website"/>
  <meta property="og:site_name"   content="T0kenRent"/>
  <meta property="og:title"       content="List Your Item — T0kenRent"/>
  <meta property="og:description" content="Earn from gear you don't use every day. List in minutes."/>
  <meta property="og:image"       content="https://tokenrent-psi.vercel.app/og-image.png"/>
  <meta property="og:url"         content="https://tokenrent-psi.vercel.app/list-item.html"/>
  <meta name="twitter:card"       content="summary_large_image"/>
  <meta name="twitter:image"      content="https://tokenrent-psi.vercel.app/og-image.png"/>
  <title>List Your Item — T0kenRent</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>

  <style>
    .list-wrap { max-width: 1100px; margin: 0 auto; padding: 36px clamp(16px, 4vw, 32px) 80px; }

    .list-head { margin-bottom: 28px; }
    .list-head h1 { font-family:'Syne',sans-serif; font-weight: 800; font-size: clamp(1.7rem, 3vw, 2.3rem); letter-spacing: -1px; margin-bottom: 6px; }
    .list-head p  { color: var(--muted); font-size: .92rem; }

    /* Step progress */
    .step-track {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }
    .step {
      flex: 1;
      padding: 14px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius);
      transition: border-color .2s, background .2s;
    }
    .step.active { border-color: var(--cyan); background: rgba(0,200,255,.04); }
    .step.done { border-color: rgba(74,222,128,.3); }
    .step-num {
      font-family:'Syne',sans-serif;
      font-size: .68rem; font-weight: 800;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .step.active .step-num { color: var(--cyan); }
    .step.done .step-num   { color: var(--success); }
    .step-name { font-family:'Syne',sans-serif; font-weight: 700; font-size: .9rem; }
    .step-name.mobile-hide { display: none; }
    @media (min-width: 640px) { .step-name.mobile-hide { display: block; } }

    /* Form card */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: clamp(20px, 3vw, 32px);
    }
    .form-section { margin-bottom: 28px; }
    .form-section:last-child { margin-bottom: 0; }
    .form-section h3 {
      font-family:'Syne',sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 4px;
    }
    .form-section .section-help {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* Photo dropzone */
    .dropzone {
      border: 2px dashed var(--border-mid);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--cyan);
      background: var(--cyan-10);
    }
    .dropzone .dz-icon { font-size: 2rem; margin-bottom: 10px; }
    .dropzone h4 { font-family:'Syne',sans-serif; font-weight: 700; font-size: .92rem; margin-bottom: 4px; }
    .dropzone p { font-size: .8rem; color: var(--muted); }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .photo-tile {
      aspect-ratio: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      position: relative;
    }
    .photo-tile .remove {
      position: absolute;
      top: 4px; right: 4px;
      width: 22px; height: 22px;
      background: rgba(0,0,0,.7);
      border: 1px solid var(--border-mid);
      border-radius: 50%;
      color: var(--white);
      font-size: .7rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-tile .remove:hover { background: var(--pink); border-color: var(--pink); }

    /* Action footer */
    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border-soft);
      flex-wrap: wrap;
    }
    .form-actions .left { color: var(--muted); font-size: .82rem; }

    /* Success modal style */
    .success-msg {
      display: none;
      background: rgba(74,222,128,.08);
      border: 1px solid rgba(74,222,128,.3);
      color: var(--success);
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: .88rem;
      margin-bottom: 22px;
    }
  </style>
</head>
<body>
  <script>
    // Listing is now part of the authenticated shell.
    location.replace('dashboard.html#list');
  </script>
</body>
</html>
