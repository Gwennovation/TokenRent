<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta property="og:type"        content="website"/>
  <meta property="og:site_name"   content="T0kenRent"/>
  <meta property="og:title"       content="Browse Equipment — T0kenRent"/>
  <meta property="og:description" content="Find cameras, tools, vehicles and more from verified local owners."/>
  <meta property="og:image"       content="https://tokenrent-psi.vercel.app/og-image.png"/>
  <meta property="og:url"         content="https://tokenrent-psi.vercel.app/browse.html"/>
  <meta name="twitter:card"       content="summary_large_image"/>
  <meta name="twitter:image"      content="https://tokenrent-psi.vercel.app/og-image.png"/>
  <title>Browse Equipment — T0kenRent</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>

  <style>
    .browse-wrap { max-width: 1280px; margin: 0 auto; padding: 36px clamp(20px, 4vw, 56px) 80px; }

    .browse-head { margin-bottom: 28px; }
    .browse-head h1 { font-family:'Syne',sans-serif; font-weight:800; font-size: clamp(1.6rem, 3vw, 2.2rem); letter-spacing:-1px; margin-bottom: 6px; }
    .browse-head p  { color: var(--muted); font-size: .92rem; }

    /* Search bar */
    .search-bar {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      padding: 18px;
      margin-bottom: 22px;
    }
    .search-input {
      position: relative;
    }
    .search-input input {
      padding-left: 42px;
    }
    .search-input .icn {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* Filter pills */
    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .pill {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      color: var(--soft);
      padding: 7px 16px;
      border-radius: 99px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      user-select: none;
    }
    .pill:hover { color: var(--white); border-color: var(--cyan); }
    .pill.active {
      background: var(--cyan);
      color: var(--bg-deep);
      border-color: var(--cyan);
    }

    .results-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: .85rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 10px;
    }
    .results-meta strong { color: var(--white); }

    /* Item card */
    .item-card {
      background: var(--bg-card);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      height: 100%;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }
    .item-card:hover {
      transform: translateY(-4px);
      border-color: rgba(0,200,255,.3);
      box-shadow: var(--shadow-pop);
    }
    .item-card .ic-img {
      height: 180px;
      background: linear-gradient(135deg, #1C1C2E, #2A1A3E);
      position: relative;
      overflow: hidden;
    }
    .item-card .ic-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease;
    }
    .item-card:hover .ic-img img { transform: scale(1.06); }
    .item-card .ic-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(11,11,18,.5) 100%);
      pointer-events: none;
    }
    .item-card .ic-badge {
      position: absolute;
      top: 12px; right: 12px;
    }
    .item-card .ic-body {
      padding: 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .item-card .ic-cat {
      font-size: .68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .item-card .ic-title {
      font-family:'Syne',sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .item-card .ic-owner {
      font-size: .76rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .item-card .ic-foot {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border-soft);
    }
    .item-card .ic-price {
      font-family:'Syne',sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--cyan);
    }
    .item-card .ic-price span {
      font-size: .68rem; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400;
    }
    .item-card .ic-rating {
      font-size: .76rem;
      color: var(--muted);
    }
    .item-card .ic-rating em { color: #FFC000; font-style: normal; }

    /* Skeleton card */
    .skel-card { padding: 0 !important; }
    .skel-card .ic-img { background: linear-gradient(90deg,var(--bg-card),var(--bg-surface),var(--bg-card)); background-size: 200% 100%; animation: skel 1.4s infinite; }
    .skel-line { height: 14px; border-radius: 6px; margin: 8px 0; }

    /* Pagination */
    .tr-pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 32px;
    }
    .tr-pagination button {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .tr-pagination button:hover { color: var(--white); border-color: var(--cyan); }
    .tr-pagination button.active { background: var(--cyan); color: var(--bg-deep); border-color: var(--cyan); }

    @media (max-width: 768px) {
      .browse-wrap { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>
  <script>
    // Browsing is now part of the authenticated shell.
    location.replace('dashboard.html#browse');
  </script>
</body>
</html>
